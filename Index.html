<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Estudiantes de Mendoza - Iniciar Sesión</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="https://www.google.com/s2/favicons?domain=mendoza.edu.ar">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo-header">
                <img src="https://via.placeholder.com/150x80.png?text=Logo+GEI" alt="Logo GEI" class="logo">
                <h1>Gestión de Estudiantes</h1>
                <p>Ministerio de Educación, Cultura y Empleo</p>
                <p>Mendoza - Argentina</p>
            </div>
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Usuario / DNI</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="login-button">Iniciar Sesión</button>
                <p class="footer-text">Sistema de Gestión Integral Educativa</p>
            </form>
        </div>
    </div>

 <link rel="stylesheet" href="/Pagina-login-gei/style.css">
<script src="/Pagina-login-gei/script.js"></script>
    
</body>
</html>
